[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "app_yaml_from_context"
version = "0.1.0"
description = "Applier — walks a config tree and resolves overwrite_from_context / overwrite_from_env sections."
license = "MIT"
authors = [{ name = "MTA" }]
requires-python = ">=3.11,<3.12"
dependencies = ["runtime-template-resolver>=0.1.0"]

[project.optional-dependencies]
dev = ["pytest>=8.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/app_yaml_from_context"]

[tool.pytest.ini_options]
testpaths = ["tests"]
