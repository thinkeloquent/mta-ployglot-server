[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "runtime_template_resolver"
version = "0.1.0"
description = "Engine — resolves {{path}}, {{fn:NAME}}, {{env.VAR}} templates against a context."
license = "MIT"
authors = [{ name = "MTA" }]
requires-python = ">=3.11,<3.12"
dependencies = ["env-resolve>=0.1.0"]

[project.optional-dependencies]
dev = ["pytest>=8.0.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/runtime_template_resolver"]

[tool.pytest.ini_options]
testpaths = ["tests"]
