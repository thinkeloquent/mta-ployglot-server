[project]
name = "polyglot-vault-file"
version = "1.0.0"
description = "Vault file + env-store SDK (Python twin of @polyglot/vault-file)."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11,<3.12"
dependencies = [
  "pydantic==2.12.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/polyglot_vault_file"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
asyncio_mode = "auto"
addopts = "--cov=polyglot_vault_file --cov-report=term --cov-report=html:coverage --cov-fail-under=85"

[tool.uv]
dev-dependencies = [
  "pytest>=8.0.0",
  "pytest-asyncio>=0.23.0",
  "pytest-cov>=5.0.0",
  "ruff>=0.4.0",
]
