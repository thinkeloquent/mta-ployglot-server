[project]
name = "polyglot-aws-s3"
version = "0.1.0"
description = "Polyglot AWS S3 HTTPS client builder (Python) — proxy + timeouts + path-style + endpoint resolution via aiobotocore + botocore.Config."
requires-python = ">=3.11,<3.12"
dependencies = [
    "aiobotocore[boto3]==3.1.1",
]

[project.optional-dependencies]
dev = [
    "moto[s3]>=5.0.0",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "mypy>=1.10.0",
    "ruff>=0.6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["polyglot_aws_s3"]

[tool.pytest.ini_options]
testpaths = ["test"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.11"
strict_optional = true
ignore_missing_imports = true

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
