[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "print-routes-fastapi"
version = "0.1.0"
description = "Print registered FastAPI routes in a flat fixed-width table."
readme = "README.md"
requires-python = ">=3.11,<3.12"
license = "MIT"
authors = [{ name = "mta" }]
dependencies = [
  "fastapi==0.128.0",
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Framework :: FastAPI",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "httpx[http2]>=0.28.1",
  "ruff>=0.6",
  "build",
]

[tool.hatch.build.targets.wheel]
packages = ["print_routes_fastapi"]
