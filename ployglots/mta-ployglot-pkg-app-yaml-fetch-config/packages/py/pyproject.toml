[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "app_yaml_fetch_config"
version = "0.1.0"
requires-python = ">=3.11,<3.12"
dependencies = ["pyyaml==6.0.3"]

[tool.hatch.build.targets.wheel]
packages = ["src/app_yaml_fetch_config"]

[tool.pytest.ini_options]
testpaths = ["tests"]
