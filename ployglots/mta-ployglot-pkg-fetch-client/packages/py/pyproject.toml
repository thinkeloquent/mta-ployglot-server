[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "polyglot-fetch-http-client"
version = "0.1.0"
description = "Async HTTP client on top of httpx with auth, retry, circuit breaker, caching, and structured logging. Python twin of @polyglot/fetch-http-client."
readme = "README.md"
requires-python = ">=3.11,<3.12"
license = "MIT"
authors = [{ name = "polyglot-fetch-http-client contributors" }]
keywords = ["http", "async", "httpx", "retry", "circuit-breaker", "cache"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Framework :: AsyncIO",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Internet :: WWW/HTTP",
  "Typing :: Typed",
]
dependencies = [
  "httpx[http2]>=0.28.1",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "pytest-cov>=4.1",
  "ruff>=0.4",
  "respx>=0.21",
]

[project.urls]
Homepage = "https://github.com/mta/mta-ployglot-pkg-fetch-client"
Repository = "https://github.com/mta/mta-ployglot-pkg-fetch-client"

[tool.hatch.build.targets.wheel]
packages = ["fetch_http_client"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
filterwarnings = ["error::DeprecationWarning"]

[tool.coverage.run]
source = ["fetch_http_client"]
branch = false

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 100
exclude_lines = [
  "pragma: no cover",
  "if TYPE_CHECKING:",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "RUF"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["B", "SIM"]
"examples/**/*.py" = ["B", "SIM"]
