[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "polyglot-figma-api"
version = "0.1.0"
description = "Polyglot Figma REST API client on top of polyglot-fetch-http-client. Typed, token-auth, proxy-aware."
readme = "README.md"
requires-python = ">=3.11,<3.12"
license = "MIT"
authors = [{ name = "polyglot-figma-api contributors" }]
keywords = ["figma", "api", "http", "async", "httpx"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Framework :: AsyncIO",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Internet :: WWW/HTTP",
  "Typing :: Typed",
]
dependencies = [
  "polyglot-fetch-http-client",
  "httpx[http2]>=0.28.1",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "pytest-cov>=4.1",
  "ruff>=0.4",
  "respx>=0.21",
]

[project.urls]
Homepage = "https://github.com/thinkeloquent/mta-ployglot-pkg-figma-api"
Repository = "https://github.com/thinkeloquent/mta-ployglot-pkg-figma-api"

[tool.hatch.build.targets.wheel]
packages = ["figma_api"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.coverage.run]
source = ["figma_api"]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 100
exclude_lines = [
  "pragma: no cover",
  "if TYPE_CHECKING:",
  "raise NotImplementedError",
  # Protocol method stubs — bodies are `...` and never execute.
  "\\.\\.\\.$",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "RUF"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["B", "SIM"]
"examples/**/*.py" = ["B", "SIM"]
