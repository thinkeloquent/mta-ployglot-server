name: Release Preflight (on PR)

# Runs make release-preflight on every PR opened/updated against a release/*
# branch. Acts as the gate that prevents a release-PR from merging when any
# sibling fails the Checklist gate set.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - 'release/**'

# Latest commit on a PR wins — older runs cancel.
concurrency:
  group: release-preflight-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          # GH_PAT must have contents:read on this repo AND on every private
          # repo referenced from .gitmodules (e.g. mta-ployglot-agentfiles-claude).
          # The default GITHUB_TOKEN cannot reach sibling private repos, so
          # `submodules: recursive` would 404 without this override.
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pip-audit + check-jsonschema
        # security-scan needs pip-audit for the FastAPI dep audit. With CI=1
        # set on the make calls below, security-scan hard-fails when pip-audit
        # is absent — install it here so the gate can do its job.
        # check-jsonschema is required by scripts/workspace/validate.sh, which
        # bootstrap.sh invokes to validate workspace.toml against its schema.
        run: |
          pipx install pip-audit
          pipx install check-jsonschema
          pip-audit --version
          check-jsonschema --version

      - name: Configure git auth for sibling clones
        # bootstrap.sh clones every workspace.toml sibling via raw `git clone
        # https://github.com/thinkeloquent/...`. actions/checkout's PAT only
        # applies to the current repo's .git/config, not to follow-up clones,
        # so we install a global insteadOf rule that injects GH_PAT into every
        # github.com HTTPS clone the runner makes from this point on.
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Bootstrap workspace (hydrate siblings)
        # bootstrap.sh hydrate clones every sibling under WORKSPACE_OVERRIDE_ROOT
        # so the registry and orchestrator helpers see them at known paths.
        run: |
          export WORKSPACE_OVERRIDE_ROOT="$RUNNER_TEMP/siblings"
          ./scripts/workspace/bootstrap.sh

      - name: Doctor (verify symlinks, registry, sibling clones)
        run: make doctor

      - name: Install server deps (so twin-diff runtime emitters can resolve imports)
        # Both runtime emitters (server/fastify/bin/emit-route-manifest.mjs and
        # server/fastapi/bin/emit_route_manifest.py) execute the addons in a
        # sandbox and capture route registrations. If their workspace imports
        # (`@ployglot/app-yaml-fetch-config`, `app_yaml_fetch_config`, etc.)
        # don't resolve, those route files raise on import and the runtime
        # emitter silently misses their routes — leading to within-twin
        # static-vs-runtime gaps and cross-twin drift in twin-diff.
        run: make install

      - name: Release preflight
        # CI=1 puts every gate in strict mode (vault-check hard-fails on unset
        # keys; security-scan hard-fails on missing pip-audit or when neither
        # GH_TOKEN_SECSCAN nor GITHUB_TOKEN_SECSCAN is set). VAULT_CHECK and
        # any DEV-only opt-outs are ignored under CI=1. The token (either
        # name) authenticates the GHE secret-scanning alerts API; provision
        # as a repo/org secret with `secret_scanning_alerts: read`.
        env:
          CI: '1'
          # Either secret name is accepted; GH_TOKEN_SECSCAN wins when both
          # are set. Provision whichever your org standardizes on.
          GH_TOKEN_SECSCAN: ${{ secrets.GH_TOKEN_SECSCAN }}
          GITHUB_TOKEN_SECSCAN: ${{ secrets.GITHUB_TOKEN_SECSCAN }}
          # vault-check (Makefile.gates:31) probes presence of every env key
          # referenced in the source via process.env / os.environ. Under CI=1
          # it hard-fails on any unset key and explicitly ignores VAULT_CHECK=warn
          # (Makefile.gates:38). Runtime code already guards every key with `??`
          # / .get() defaults — these placeholders satisfy the presence probe
          # without bypassing the gate.
          APP_ENV: ci
          BUILD_ID: ${{ github.run_id }}
          BUILD_VERSION: ${{ github.sha }}
          COMPUTE_FUNCTIONS_DIRS: server/compute-functions
          COMPUTE_FUNCTIONS_REQUIRE_AT_LEAST_ONE: 'false'
          HOST: 0.0.0.0
          PORT: '3000'
          LOG_DIR: /tmp/logs
          LOG_LEVEL: info
          HTTP_PROXY: ci-no-proxy
          HTTPS_PROXY: ci-no-proxy
          HTTP_PROXY_USER: ci-no-proxy
          HTTP_PROXY_PASS: ci-no-proxy
        run: make release-preflight REF=${{ github.event.pull_request.base.ref }}

      - name: Capture preflight JSON report
        if: always()
        env:
          CI: '1'
          # Either secret name is accepted; GH_TOKEN_SECSCAN wins when both
          # are set. Provision whichever your org standardizes on.
          GH_TOKEN_SECSCAN: ${{ secrets.GH_TOKEN_SECSCAN }}
          GITHUB_TOKEN_SECSCAN: ${{ secrets.GITHUB_TOKEN_SECSCAN }}
          # Same vault-check placeholders as the preflight step above; the
          # JSON variant runs the same gate stack.
          APP_ENV: ci
          BUILD_ID: ${{ github.run_id }}
          BUILD_VERSION: ${{ github.sha }}
          COMPUTE_FUNCTIONS_DIRS: server/compute-functions
          COMPUTE_FUNCTIONS_REQUIRE_AT_LEAST_ONE: 'false'
          HOST: 0.0.0.0
          PORT: '3000'
          LOG_DIR: /tmp/logs
          LOG_LEVEL: info
          HTTP_PROXY: ci-no-proxy
          HTTPS_PROXY: ci-no-proxy
          HTTP_PROXY_USER: ci-no-proxy
          HTTP_PROXY_PASS: ci-no-proxy
        run: |
          mkdir -p /tmp/preflight
          make -s release-preflight-json REF=${{ github.event.pull_request.base.ref }} \
            > /tmp/preflight/preflight-${{ github.event.pull_request.number }}.jsonl 2>/tmp/preflight/preflight-${{ github.event.pull_request.number }}.log \
            || true

      - name: Upload preflight report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-report-${{ github.event.pull_request.number }}
          path: |
            /tmp/preflight/preflight-*.jsonl
            /tmp/preflight/preflight-*.log
          if-no-files-found: warn
