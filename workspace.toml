# workspace.toml — single source of truth for the polyglot meta-repo topology.
#
# Consumed by scripts/workspace/{bootstrap,emit-*,doctor,subtree-*}.sh.
# Validated against scripts/workspace/schema/workspace.schema.json.
#
# Conventions:
#   - name           : kebab-case, unique across the registry
#   - remote         : Git remote URL (HTTPS or SSH)
#   - local_path     : sibling clone location, relative to this orchestration shell
#   - shell_path     : where the symlink to local_path lives inside this repo
#   - language       : node | python | go | rust | mixed
#   - subtree_prefix : path inside the assembled release branch (often == shell_path)
#   - default_ref    : branch/tag pulled at release-assembly time (default: "main")
#
# A vault-stored override `WORKSPACE_OVERRIDE_<NAME_UPPER>` takes precedence
# over `local_path` for engineers keeping siblings in non-default locations.
# (See vault-file-priority memory: vault-wins.)

# --- server / bootstrap runtimes ---

[[entry]]
name           = "server-bootstrap"
remote         = "https://github.com/thinkeloquent/mta-ployglot-server-bootstrap.git"
local_path     = "../mta-ployglot-server-bootstrap"
shell_path     = "ployglots/mta-ployglot-server-bootstrap"
language       = "mixed"
subtree_prefix = "ployglots/mta-ployglot-server-bootstrap"
default_ref    = "main"

