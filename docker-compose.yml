# docker-compose.yml — GENERATED by scripts/workspace/docker-compose-emit.sh
# DO NOT EDIT BY HAND. Source of truth: workspace.toml + this emitter.
# Re-emit:  bash scripts/workspace/docker-compose-emit.sh
# CI gate:  bash scripts/workspace/docker-compose-emit.sh --check
#
# Two-service polyglot bootstrap stack. Build context is the repo root so
# both Dockerfiles can COPY from ployglots/. Every registered sibling is
# also exposed as `ployglot-<name>` via build.additional_contexts so
# Dockerfiles can `COPY --from=ployglot-<name> ...` without hardcoding
# paths inside ployglots/.
#
# Default host ports: 5100 (fastify), 5200 (fastapi). Override via .env.
# Container-internal ports are fixed at 3000 (fastify) and 8080 (fastapi).
#
# Hardening (limited, not production):
#   - init: true  -> docker-init as PID 1 for correct signal forwarding
#   - read_only: true  -> immutable root FS; writable scratch via tmpfs
#   - cap_drop: [ALL]  -> drop all Linux capabilities
#   - security_opt: no-new-privileges:true  -> block setuid escalation
#   - restart: unless-stopped

services:
  fastify:
    image: mta-fastify:local
    container_name: mta-fastify
    build:
      context: .
      dockerfile: server/fastify/Dockerfile
      additional_contexts:
        ployglot-server-bootstrap: ./ployglots/mta-ployglot-server-bootstrap
        ployglot-print-routes: ./ployglots/mta-ployglot-server-print-routes
        ployglot-api-aws-s3: ./ployglots/mta-ployglot-api-aws-s3
        ployglot-api-github-project: ./ployglots/mta-ployglot-api-github-project
        ployglot-pkg-fetch-client: ./ployglots/mta-ployglot-pkg-fetch-client
        ployglot-pkg-figma-api: ./ployglots/mta-ployglot-pkg-figma-api
        ployglot-pkg-vault: ./ployglots/mta-ployglot-pkg-vault
        ployglot-pkg-env-resolve: ./ployglots/mta-ployglot-pkg-env-resolve
        ployglot-pkg-app-yaml-loader: ./ployglots/mta-ployglot-pkg-app-yaml-loader
        ployglot-pkg-runtime-template-resolver: ./ployglots/mta-ployglot-pkg-app-yaml-overwrite
        ployglot-pkg-app-yaml-config: ./ployglots/mta-ployglot-pkg-app-yaml-config
        ployglot-pkg-app-yaml-fetch-config: ./ployglots/mta-ployglot-pkg-app-yaml-fetch-config
        ployglot-tools-flatten-project-files: ./ployglots/mta-ployglot-tools-flatten-project-files
        ployglot-tools-prompt-injection-defense: ./ployglots/mta-ployglot-tools-prompt-injection-defense-strategies
    environment:
      PORT: "3000"
      NODE_ENV: production
      POLYGLOT_DEBUG: "1"
    ports:
      - "${FASTIFY_PORT:-5100}:3000"
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3000/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5
    restart: unless-stopped

  fastapi:
    image: mta-fastapi:local
    container_name: mta-fastapi
    build:
      context: .
      dockerfile: server/fastapi/Dockerfile
      additional_contexts:
        ployglot-server-bootstrap: ./ployglots/mta-ployglot-server-bootstrap
        ployglot-print-routes: ./ployglots/mta-ployglot-server-print-routes
        ployglot-api-aws-s3: ./ployglots/mta-ployglot-api-aws-s3
        ployglot-api-github-project: ./ployglots/mta-ployglot-api-github-project
        ployglot-pkg-fetch-client: ./ployglots/mta-ployglot-pkg-fetch-client
        ployglot-pkg-figma-api: ./ployglots/mta-ployglot-pkg-figma-api
        ployglot-pkg-vault: ./ployglots/mta-ployglot-pkg-vault
        ployglot-pkg-env-resolve: ./ployglots/mta-ployglot-pkg-env-resolve
        ployglot-pkg-app-yaml-loader: ./ployglots/mta-ployglot-pkg-app-yaml-loader
        ployglot-pkg-runtime-template-resolver: ./ployglots/mta-ployglot-pkg-app-yaml-overwrite
        ployglot-pkg-app-yaml-config: ./ployglots/mta-ployglot-pkg-app-yaml-config
        ployglot-pkg-app-yaml-fetch-config: ./ployglots/mta-ployglot-pkg-app-yaml-fetch-config
        ployglot-tools-flatten-project-files: ./ployglots/mta-ployglot-tools-flatten-project-files
        ployglot-tools-prompt-injection-defense: ./ployglots/mta-ployglot-tools-prompt-injection-defense-strategies
    environment:
      PORT: "8080"
      POLYGLOT_DEBUG: "1"
    ports:
      - "${FASTAPI_PORT:-5200}:8080"
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2); sys.exit(0 if r.status == 200 else 1)"
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5
    restart: unless-stopped
